# vLLM config for openai/gpt-oss-120b on Isambard AI
# Generated by ivllm generate-vllm-config
#
# Hardware: 4 × GH200 120GB per node (Isambard AI Phase 1/2) — ~96 GiB usable HBM3e per GPU
# Model: 117B parameters (MoE, 5.1B activated), MXFP4-quantized MoE weights
#
# Memory: the MoE weights are MXFP4 (0.5 bytes/param) so effective weight
# footprint is ~59 GB — fits on a single H100 80 GB, let alone the GH200's ~96 GiB.
# tp=2 is recommended for reasonable KV-cache headroom at 131K context
# and higher throughput on long reasoning chains.
#
# GPT-OSS support is integrated into mainline vLLM since ≥0.15.1.
# No special wheels needed — the standard ivllm setup venv is sufficient.
#
# Usage: ivllm start <job-name> --config design/example/gpt-oss-120b.yaml
#
# API: the /v1/responses endpoint is recommended for full tool use (browsing,
# Python, MCP). Standard /v1/chat/completions also works; reasoning is
# returned inline. See https://docs.vllm.ai/projects/recipes/en/latest/OpenAI/GPT-OSS.html

model: openai/gpt-oss-120b
tensor-parallel-size: 2
max-model-len: 131072
# 128K context; the model supports up to 131072 tokens natively.
# Increase to 131072 with tp=4 if you need maximum context and throughput.
gpu-memory-utilization: 0.90
dtype: auto
# MXFP4-quantized MoE weights; dtype: auto lets vLLM select the correct dtypes.

# Hopper-specific performance settings (from official vLLM recipe for H100/H200)
no-enable-prefix-caching: true
# Prefix caching is incompatible with the attention-sink mechanism used by this model.
max-cudagraph-capture-size: 2048
max-num-batched-tokens: 8192
stream-interval: 20

# Tool calling — use the 'openai' parser for gpt-oss structured function calls.
# For full built-in tool use (browsing, Python, MCP), also pass --tool-server.
enable-auto-tool-choice: true
tool-call-parser: openai
