# vLLM config for Qwen/Qwen3.5-35B-A3B on Isambard AI — long-context variant
# Generated by ivllm generate-vllm-config
#
# Hardware: 4 × GH200 120GB per node (Isambard AI Phase 1/2) — ~96 GiB usable HBM3e per GPU
# Model: 35B total parameters (MoE, 3B activated), ~70 GB at bfloat16
# Architecture: Hybrid Gated DeltaNet (30 layers) + Gated Attention (10 layers) + sparse MoE
#
# Long-context rationale:
#   This model's hybrid architecture makes it unusually KV-cache-efficient.
#   Only the 10 standard Gated Attention layers accumulate a traditional per-token
#   KV cache; the 30 Gated DeltaNet layers use a fixed-size recurrent state.
#
#   KV cache at full 262,144 tokens (attention layers only):
#     10 layers × 2 KV heads × head_dim 256 × 2 bytes × 262,144 tokens ≈ 2.5 GB
#
#   On a single Isambard AI node with tp=2:
#     Available VRAM : 2 × 86.4 GB = 172.8 GB
#     Weights        : ~70 GB
#     KV cache       : ~2.5 GB at full 262K context
#     Total used     : ~72.5 GB — fits with large margin, no multi-node required.
#
# Usage: ivllm start <job-name> --config design/example/qwen3.5-long-context.yaml

model: Qwen/Qwen3.5-35B-A3B
tensor-parallel-size: 2
max-model-len: 262144
# Native context ceiling; the hybrid architecture keeps KV cache tiny (~2.5 GB)
# even at full 262K. Reduce only if you encounter OOM on activations during
# very large batch prefills.
gpu-memory-utilization: 0.90
dtype: bfloat16

# MoE expert parallelism: routes MoE layers via all-to-all (more efficient than
# tensor-parallel sharding of expert weights) when tp >= 2.
enable-expert-parallel: true

# Tool calling — required for structured tool_calls in API responses.
# Qwen3.5 uses the Qwen3-series chat format; qwen3_coder is the standard parser.
# If tool calls are malformed, try 'hermes' as a fallback.
enable-auto-tool-choice: true
tool-call-parser: qwen3_coder

# Prefix caching — especially valuable here: a long shared system prompt or
# document context is cached across requests, amortising the prefill cost.
enable-prefix-caching: true

min-vllm-version: "0.9.1"
# min-vllm-version: Qwen3.5 support requires vLLM >= 0.9.1 with the qwen3_coder parser.
# ivllm checks this before submitting; stripped before passing to vLLM.
