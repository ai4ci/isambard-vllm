# vLLM config for google/gemma-4-31B-it on Isambard AI
# Generated by ivllm generate-vllm-config
#
# Hardware: 4 × GH200 120GB per node (Isambard AI Phase 1/2) — ~96 GiB usable HBM3e per GPU
# Model: 30.7B dense parameters, ~62 GB at bfloat16
# Parallelism: single GPU (62 GB weights fit on one GH200 120GB (~96 GiB usable), ~24 GiB KV headroom)
#
# Architecture: Dense hybrid transformer
#   60 layers alternating local sliding-window (1024 tokens) and global attention
#   Global layers use unified (1-head) KV — unusually KV-cache efficient.
#   Vision encoder: ~550 M params (text + image; no audio on 31B)
#   Thinking mode: structured reasoning via <|channel|>thought... delimiters
#   Function calling: native tool-use protocol with dedicated special tokens
#
# Context: native 256K tokens — reduced to 32768 as a practical default.
#   To increase, set max-model-len up to 262144; the hybrid attention keeps
#   KV cache small even at long contexts due to unified KV heads on global layers.
#
# ⚠ Gemma 4 is NOT currently runnable on Isambard AI:
#   - vLLM Gemma 4 nightly wheels require CUDA 12.9 (cu129) or 13.0 (cu130)
#   - Isambard AI GPU driver is 565.57.01, which supports CUDA 12.7 maximum
#   - CUDA 12.9 requires driver ≥ ~575; the Apptainer container approach is
#     also blocked by this — containers still need a compatible host driver
#   - The stable vLLM 0.15.1 release (used by `ivllm setup`) does not include
#     Gemma 4 support
#
#   This config is kept as a forward-compatible reference. It will work once
#   either the Isambard GPU driver is updated (≥ 575) or Gemma 4 support lands
#   in a stable vLLM release built against CUDA ≤ 12.7.
#
# Usage: ivllm start <job-name> --config design/example/gemma-4-31B-it.yaml

model: google/gemma-4-31B-it
tensor-parallel-size: 1
max-model-len: 32768
# Native context: 262144 — increase if your workload needs longer context;
# the model's unified KV on global layers keeps cache growth modest.
gpu-memory-utilization: 0.90
dtype: bfloat16

# Required for Gemma 4's custom multimodal processing pipeline.
trust-remote-code: true

# Thinking / reasoning — exposes step-by-step reasoning in the
# reasoning_content field of the API response.
reasoning-parser: gemma4

# Tool calling — Gemma 4 uses a custom protocol with dedicated special tokens;
# the gemma4 parser handles serialisation/deserialisation into tool_calls objects.
enable-auto-tool-choice: true
tool-call-parser: gemma4

# Prefix caching — valuable for repeated system prompts and document contexts.
enable-prefix-caching: true

# Text-only workload: uncomment to skip vision encoder memory allocation
# and avoid multimodal profiling overhead.
# limit-mm-per-prompt: "image=0,audio=0"

min-vllm-version: "0.9.1"
# min-vllm-version: Gemma 4 support is NOT in vLLM 0.15.1 (current stable); a nightly
# build built against cu130 is required. Update this once Gemma 4 lands in a stable
# vLLM release. ivllm checks this before submitting; stripped before passing to vLLM.
