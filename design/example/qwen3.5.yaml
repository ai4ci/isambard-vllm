# vLLM config for Qwen/Qwen3.5-35B-A3B on Isambard AI
# Generated by ivllm generate-vllm-config
#
# Hardware: 4 × H100 96 GB per node (Isambard AI Phase 1/2)
# Model: 35B total parameters (MoE, 3B activated), ~70 GB at bfloat16
# Architecture: Hybrid Gated DeltaNet + Gated Attention + sparse MoE
#
# Parallelism: tp=2
#   Weights: 70 GB / 2 nodes = ~35 GB per GPU — fits comfortably on 1 node
#   Technically fits on 1 GPU (70 GB < 86.4 GB usable), but tp=2 leaves
#   ~51 GB/GPU for KV cache, giving far more headroom for concurrent requests.
#   Gated Attention has 16 Q heads; tp=2 (16/2=8 per GPU) is valid.
#
# Usage: ivllm start <job-name> --config design/example/qwen3.5.yaml

model: Qwen/Qwen3.5-35B-A3B
tensor-parallel-size: 2
max-model-len: 32768
# Native context: 262,144 tokens — reduced to 32,768 to limit KV cache memory.
# Restore to 131072 or higher if you need long-context retrieval (requires more VRAM).
gpu-memory-utilization: 0.90
dtype: bfloat16

# MoE expert parallelism: routes MoE layers via all-to-all (more efficient than
# tensor-parallel sharding of expert weights) when tp >= 2.
enable-expert-parallel: true

# Tool calling — required for structured tool_calls in API responses.
# Qwen3.5 uses the Qwen3-series chat format; qwen3_coder is the standard parser.
# If tool calls are malformed, try 'hermes' as a fallback.
enable-auto-tool-choice: true
tool-call-parser: qwen3_coder

# Prefix caching — low cost, high benefit for repeated system prompts in agentic use.
enable-prefix-caching: true
