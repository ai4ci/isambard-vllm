# vLLM config for MiniMaxAI/MiniMax-M2.5 on Isambard AI
# Generated by ivllm generate-vllm-config
#
# Hardware: 4 × GH200 120GB per node (Isambard AI Phase 1/2) — ~96 GiB usable HBM3e per GPU
# Model: 230B total parameters (MoE, 10B activated), ~220 GB weight footprint
#
# Parallelism: tp=4 (single node)
#   Weight memory ~220 GB across 4 × 86.4 GB = 345.6 GB usable.
#   Remaining ~125 GB supports the full 196K native context window comfortably.
#   Expert parallelism enabled alongside TP for MoE layer efficiency (per recipe).
#
# NOTE: MiniMax-M2.5 may require a newer vLLM than the current 0.15.1 install.
# The official recipe verified accuracy at commit dea63512bb9bdf7521d591546c52138d9d79e8ce.
# If you see corrupted output or missing parser errors, run ivllm setup with
# vllmVersion updated to a nightly build:
#   uv pip install -U vllm --extra-index-url https://wheels.vllm.ai/nightly
#
# Usage: ivllm start <job-name> --config design/example/minimax-m2.5.yaml

model: MiniMaxAI/MiniMax-M2.5
tensor-parallel-size: 4
max-model-len: 196608
# Full native context (196K tokens). The recipe confirms 4 × GH200 120GB (~96 GiB each) supports
# ~400K total KV cache capacity — more than sufficient for 196K per sequence.
gpu-memory-utilization: 0.90
dtype: bfloat16
trust-remote-code: true

# Expert parallelism: recommended by vLLM recipe for Hopper TP4+EP (H100/GH200).
# Routes MoE layers via all-to-all (more efficient than sharding expert weights
# across TP ranks). No pipeline parallelism needed — model fits on one node.
enable-expert-parallel: true

# Reasoning (chain-of-thought): M2.5 has native thinking capability.
# minimax_m2_append_think returns the reasoning trace within <think> tags
# in the chat completions response. Use minimax_m2 for the responses API
# if you want thinking natively integrated.
enable-reasoning: true
reasoning-parser: minimax_m2_append_think

# Tool calling — minimax_m2 handles M2.5's parallel tool call format.
enable-auto-tool-choice: true
tool-call-parser: minimax_m2

# Prefix caching — valuable for agentic workflows with shared system prompts.
enable-prefix-caching: true

min-vllm-version: "0.15.1"
# min-vllm-version: MiniMax-M2.5 support requires vLLM >= 0.15.1; a nightly build
# at a specific commit may be needed for full accuracy (see header comment above).
# ivllm checks this before submitting; stripped before passing to vLLM.
