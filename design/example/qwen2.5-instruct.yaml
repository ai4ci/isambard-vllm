# vLLM config for Qwen/Qwen2.5-0.5B-Instruct on Isambard AI
# Generated by ivllm generate-vllm-config
#
# Hardware: 4 × GH200 120GB per node (Isambard AI Phase 1/2) — ~96 GiB usable HBM3e per GPU
# Model: 0.49B parameters (dense transformer), ~1 GB at bfloat16
# Parallelism: single GPU — model is tiny, no parallelism needed

model: Qwen/Qwen2.5-0.5B-Instruct
tensor-parallel-size: 1
max-model-len: 32768
# Native context: 32,768 tokens (full native context retained)
gpu-memory-utilization: 0.90
dtype: bfloat16
enable-auto-tool-choice: true
tool-call-parser: hermes
enable-prefix-caching: true
min-vllm-version: "0.19.1"
# min-vllm-version: ivllm checks this before submitting the job; stripped before passing to vLLM.
