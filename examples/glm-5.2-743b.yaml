# vLLM config for zai-org/GLM-5.2 on Isambard AI
# Generated by generate-vllm-config
#
# Model: GLM-5.2 (~743B total parameters, 39B active) — MoE architecture
# Architecture: glm_moe_dsa (Mixture of Experts with DSA attention)
# Native context: 1,048,576 tokens (1M)
#
# Hardware: NVIDIA GH200 (Grace Hopper) — 4×120GB per node, ~96 GiB usable per GPU
# Parallelism: tp=4 × pp=3 = 12 GPUs across 3 nodes
# FP8 weights: ~743 GB total → ~62 GB/GPU (fp8) → fits on 9+ GPUs at 96 GiB
# FP8 KV cache: extra ~33 GB/node for KV cache at full 1M context
#
# Multi-node: tp=4 per node (full 4-GPU node), pp=3 stages = 3 nodes
#
# Recipe source: https://recipes.vllm.ai/zai-org/GLM-5.2
# Model card: https://huggingface.co/zai-org/GLM-5.2

model: zai-org/GLM-5.2-FP8
tensor-parallel-size: 16
enable-expert-parallel: true

max-model-len: 1048576
gpu-memory-utilization: 0.80
enable-chunked-prefill: true
max-num-batched-tokens: 4096

dtype: bfloat16
kv-cache-dtype: fp8_ds_mla
enable-auto-tool-choice: true
tool-call-parser: glm47
reasoning-parser: glm45

safetensors-load-strategy: lazy
cpu-offload-gb: 80

speculative-config:
  method: mtp
  num_speculative_tokens: 3

compilation-config: '{"pass_config": {"fuse_allreduce_rms": false}}'
enable-prefix-caching: true
min-vllm-version: "0.23.0"
#
# Notes:
#   - This model requires fp8 weights (zai-org/GLM-5.2-FP8 checkpoint)
#   - Multi-node job uses vllm serve --distributed-executor-backend ray
#   - FP8 reduces weight memory from ~1486 GB (bf16) to ~743 GB
#   - bf16 variant would require ~16 GPUs (4 nodes) or fp8 quantization
#   - Flashinfer autotune is disabled by default on MoE models; if startup
#     hangs >2 minutes, add these keys:

# gdn-prefill-backend: "triton"
# moe-backend: triton
enable-flashinfer-autotune: false

env:
  VLLM_USE_V1: 0
  VLLM_ENABLE_V1_MULTIPROCESSING: 0
  VLLM_RPC_TIMEOUT_MS: 600000

# Environment variables required for Hopper GPUs (per vLLM recipe).
# Stripped before passing to vLLM serve; rendered as export lines in the SLURM script.
# env:
#   VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "0"
#   PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
#   VLLM_USE_DEEP_GEMM_E8M0: "0"
#   VLLM_USE_DEEP_GEMM: "0"
#   VLLM_MOE_USE_DEEP_GEMM: "0"
#   VLLM_DEEP_GEMM_WARMUP: "skip"
#   VLLM_MLA_DISABLE: "1"
