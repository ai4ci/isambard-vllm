# NVIDIA Nemotron-3-Super-120B-A12B-BF16 on Isambard AI
#
# Weights: ~120B params -> ~240 GB bf16 weights, so use a full 4x GH200 node.
# NVIDIA's vLLM cookbook uses TP=4 for the BF16 variant and fp8 KV cache.
#
# Prerequisite on Isambard:
#   mkdir -p "$PROJECTDIR/ivllm/plugins/nemotron"
#   wget -O "$PROJECTDIR/ivllm/plugins/nemotron/super_v3_reasoning_parser.py" \
#     "https://huggingface.co/nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16/resolve/main/super_v3_reasoning_parser.py"
#
# ivllm symlinks $PROJECTDIR/ivllm/plugins -> ~/<job>/plugins at launch time, so
# this relative plugin path works from the job work directory.

model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16
tensor-parallel-size: 4
max-model-len: 262144
gpu-memory-utilization: 0.90
dtype: bfloat16
kv-cache-dtype: fp8

enable-auto-tool-choice: true
tool-call-parser: qwen3_coder

reasoning-parser: super_v3
reasoning-parser-plugin: ./plugins/nemotron/super_v3_reasoning_parser.py

enable-prefix-caching: true
min-vllm-version: "0.17.1"
enable-expert-parallel: true

enable-chunked-prefill: true
max-num-seqs: 512
swap-space: 0
