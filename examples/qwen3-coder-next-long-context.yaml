# vLLM config for Qwen/Qwen3.6-35B-A3B on Isambard AI
# Generated by ivllm generate-vllm-config
#
# Hardware: 4 × GH200 120GB per node (Isambard AI) — ~96 GiB usable HBM3e per GPU
# Model: 35B parameters (3B activated), ~70 GB at bfloat16
# Architecture: MoE + Gated DeltaNet + Vision Encoder (multimodal)
#   Only 10 of 40 layers use standard attention (2 KV heads, head_dim=256);
#   the remaining 30 use Gated DeltaNet (linear attention, fixed state — no per-token KV).
#   KV cache at 262K context ≈ 2.7 GB total — very small footprint.
#
# Parallelism: tp=2 (70 GB weights, ~102 GB remaining for KV cache across 2 GPUs)
# Context: 262,144 tokens (full native context)

model: Qwen/Qwen3-Coder-Next

tensor-parallel-size: 4

gpu-memory-utilization: 0.85
max-num-seqs: 64
enforce-eager: true
dtype: bfloat16

# Reasoning (thinking mode enabled by default; use /no_think in prompt to disable)
reasoning-parser: qwen3

# Tool calling
enable-auto-tool-choice: true
tool-call-parser: qwen3_coder

# MoE efficiency (expert parallelism for MoE layers alongside tensor parallelism)
enable-expert-parallel: true

# Caching
enable-prefix-caching: true

# Note: this model includes a vision encoder for image input.
# To run text-only (frees ~a few GB of memory for extra KV cache), add:
min-vllm-version: "0.17.0"

# Rope config from https://huggingface.co/Qwen/Qwen3.6-27B
hf-overrides: '{"rope_parameters": {"mrope_interleaved": true, "mrope_section": [11, 11, 10], "rope_type": "yarn", "rope_theta": 10000000, "partial_rotary_factor": 0.25, "factor": 4.0, "original_max_position_embeddings": 262144}}'
max-model-len: 1010000


# Mixture of experts models need to be forced to use triton
gdn-prefill-backend: "triton"
moe-backend: triton             # Forces vLLM to use pre-compiled Triton MoE kernels
attention-config: '{"backend":"TRITON_ATTN"}'
enable-flashinfer-autotune: false  # Explicitly kills the profiling loop

env:
  VLLM_USE_V1: 0
