# vLLM config for microsoft/FastContext-1.0-4B-RL on Isambard AI
# Generated by ivllm generate-vllm-config
#
# Hardware: 4 × GH200 120GB per node (Isambard AI Phase 1/2) — ~96 GiB usable HBM3e per GPU
# Model: 4B parameters, ~8 GB at bfloat16
# Parallelism: tp=2 (Default for models needing 1–2 GPUs; provides balance of capacity and fast queue times)

model: microsoft/FastContext-1.0-4B-RL
