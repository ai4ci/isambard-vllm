# vLLM config for zai-org/GLM-5.2 on Isambard AI
# Generated by generate-vllm-config
#
# Model: GLM-5.2 (~743B total parameters, 39B active) — MoE architecture
# Architecture: glm_moe_dsa (Mixture of Experts with DSA attention)
# Native context: 1,048,576 tokens (1M)
#
# Hardware: NVIDIA GH200 (Grace Hopper) — 4×120GB per node, ~96 GiB usable per GPU
# Parallelism: tp=4 × pp=2 = 8 GPUs across 2 nodes
#
# Recipe source: https://recipes.vllm.ai/zai-org/GLM-5.2
# Model card: https://huggingface.co/zai-org/GLM-5.2

model: cyankiwi/GLM-5.2-AWQ-INT4
tensor-parallel-size: 8
pipeline-parallel-size: 1
enable-expert-parallel: true

max-model-len: 131072
gpu-memory-utilization: 0.95
enable-chunked-prefill: true
max-num-batched-tokens: 4096

dtype: bfloat16
kv-cache-dtype: fp8_ds_mla
enable-auto-tool-choice: true
tool-call-parser: glm47
reasoning-parser: glm45


safetensors-load-strategy: lazy
# cpu-offload-gb: 100
# offload-backend: uva

enable-prefix-caching: true
min-vllm-version: "0.23.0"

enable-flashinfer-autotune: false

env:
  VLLM_RPC_TIMEOUT_MS: 600000
  VLLM_LOGGING_LEVEL: DEBUG

# This run failed to start:
# attention-config: '{"backend":"FLASHINFER_MLA_SPARSE"}' < Crashes with Selected backend AttentionBackendEnum.FLASHINFER_MLA_SPARSE is not valid for this configuration. Reason: ['kv_cache_dtype not supported', 'compute capability not supported']


compilation-config: '{"cudagraph_mode": "FULL_AND_PIECEWISE", "max_cudagraph_capture_size": 16, "cudagraph_num_of_warmups": 2, "pass_config": {"fuse_allreduce_rms": false}}'
# enforce-eager: false

# https://docs.vllm.ai/en/v0.24.0/serving/expert_parallel_deployment/
all2all-backend: deepep_low_latency
numa-bind: true
numa-bind-nodes: [0,1,2,3]


