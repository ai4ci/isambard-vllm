# vLLM config for Qwen/Qwen3.5-397B-A17B-FP8 on Isambard AI
# Generated by ivllm generate-vllm-config
#
# Hardware: 4 × GH200 96 GB per node (Isambard AI)
# Model: 397B parameters (17B activated), ~397 GB at FP8 (1 byte/param)
# Architecture: MoE + Gated DeltaNet + Vision Encoder (multimodal)
#
# Parallelism: tp=4, pp=2 — requires 2 nodes (8 GPUs total)
#   8 × 86.4 GB usable = 691 GB; 397 GB weights leaves ~294 GB for KV cache
#   ivllm start will automatically bootstrap a Ray cluster across 2 nodes.
#
# Context: 131,072 tokens (model card recommends ≥128K for thinking capability)
#   Native context is 262,144 — reduce max-model-len if you encounter OOM.

model: Qwen/Qwen3.5-397B-A17B-FP8
tensor-parallel-size: 4
pipeline-parallel-size: 2
max-model-len: 131072
gpu-memory-utilization: 0.90
dtype: bfloat16
quantization: fp8

# Reasoning (thinking mode enabled by default; use /no_think in prompt to disable)
enable-reasoning: true
reasoning-parser: qwen3

# Tool calling
enable-auto-tool-choice: true
tool-call-parser: qwen3_coder

# MoE efficiency (expert parallelism for MoE layers alongside tensor parallelism)
enable-expert-parallel: true

# Caching
enable-prefix-caching: true

# Note: text-only mode — skips the vision encoder to free memory for extra KV cache.
# Remove this line to enable image/video input.
language-model-only: true
